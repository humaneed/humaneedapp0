    <!-- PWA Manifest wird dynamisch per JS injiziert (Single-File-App) -->
    <script>
        (function injectManifest() {
            const manifest = {
                name: "HUMANEED - Biologische Abstimmung",
                short_name: "HUMANEED",
                start_url: ".",
                display: "standalone",
                background_color: "#070c11",
                theme_color: "#070c11",
                icons: [{
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23151b2b'/%3E%3Ctext y='50%25' x='50%25' dominant-baseline='middle' text-anchor='middle' font-size='50' font-family='sans-serif' fill='%2338bdf8'%3EH%3C/text%3E%3C/svg%3E",
                    sizes: "192x192",
                    type: "image/svg+xml"
                }]
            };
            const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestURL;
            document.head.appendChild(link);
        })();
    </script>

    <style>
        /* --- CSS Variablen & Reset --- */
        :root {
            --bg-color: #070c11;
            --card-bg: #151b2b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --sheet-bg: #1e293b;
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
            --app-max-width: 600px; /* Für Desktop/Tablet Zentrierung */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* Verhindert Scrollen der ganzen Seite (App-Feeling) */
            overscroll-behavior-y: none;
            display: flex;
            justify-content: center;
        }

        /* --- Layout & Views --- */
        .app-container {
            width: 100%;
            max-width: var(--app-max-width);
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Home View */
        #viewHome {
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: calc(80px + var(--safe-area-bottom));
            z-index: 1;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 800;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Grid für die 6 Dimensionen */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .card:active {
            transform: scale(0.96);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .card-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 50%; /* Default */
            border-radius: 4px;
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        /* --- Bottom Sheet --- */
        #sheetBackdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #sheetBackdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sheet {
            position: fixed; /* Fix für Desktop/Tablet Zentrierung */
            top: auto;
            bottom: 0;
            left: 50%;
            width: 100%;
            max-width: var(--app-max-width);
            height: auto;
            max-height: 85vh;
            background-color: var(--sheet-bg);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            z-index: 20;
            /* Zentriert durch translateX und versteckt durch translateY */
            transform: translateX(-50%) translateY(100%);
            padding: 20px;
            padding-bottom: calc(20px + var(--safe-area-bottom));
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .sheet.active {
            transform: translateX(-50%) translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin: 0 auto 20px auto;
        }

        .sheet-content {
            text-align: center;
        }

        .sheet-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .sheet-title {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .sheet-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Custom Range Slider */
        .slider-container {
            margin: 30px 0;
            position: relative;
        }

        .value-display {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);

        .impuls-box {
            background-color: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-top: 10px;
            margin-bottom: 20px;
            text-align: left;
            border-left: 4px solid var(--accent);
            min-height: 80px;

        .impuls-box strong {
            display: block;
            color: var(--accent);
            margin-bottom: 5px;
            font-size: 0.85rem;
            text-transform: uppercase;

            color: var(--text-main);

        .btn-save {

            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;

        /* --- Skilltree & Toast CSS --- */
        .btn-skilltree {

            color: var(--accent);
            border: 1px solid var(--accent);

            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

        .skilltree-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .btn-back {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .skill-category {
            margin-bottom: 25px;
        }

            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;

        .skill-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .skill-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid #333;
            transition: all 0.3s ease;
            opacity: 0.5;
            filter: grayscale(100%);
        }

        .skill-card.unlocked {
            opacity: 1;
            filter: grayscale(0%);
            border-left: 4px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .skill-icon {
            font-size: 2rem;
            background: rgba(255,255,255,0.05);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .skill-info h4 {
            margin: 0 0 4px 0;
            font-size: 1rem;
        }

        .skill-info p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 100;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 90%;
        }

        #toast.show {
            bottom: max(30px, env(safe-area-inset-bottom));
        }
    </style>
</head>

            { id: 'c3', cat: 'Kognition', name: 'Deep Work State', desc: 'Anhaltende, tiefe Konzentration.', icon: '🧠', reqs: { cognition: 60 } },

            { id: 'co1', cat: 'Kompetenz', name: 'Mikrogewohnheiten', desc: 'Kleine Dinge konsequent erledigen.', icon: '🌱', reqs: { competence: 20 } },
            { id: 'co2', cat: 'Kompetenz', name: 'Effizienz-Rhythmus', desc: 'Guter Flow in der Abarbeitung.', icon: '⏱️', reqs: { competence: 40 } },

            { id: 's5', cat: 'Soziales', name: 'Kollektive Resonanz', desc: 'Tiefste Verbundenheit mit allen.', icon: '🌐', reqs: { social: 95 } },

            { id: 'syn4', cat: 'Synergien', name: 'Unerschütterlich', desc: 'Physisch und mental wie ein Fels.', icon: '🪨', reqs: { body: 80, emotions: 80 } },
            { id: 'syn5', cat: 'Synergien', name: 'Mastermind', desc: 'Genialität in der perfekten Ausführung.', icon: '👑', reqs: { cognition: 80, competence: 80 } },
            { id: 'syn6', cat: 'Synergien', name: 'Charismatische Aura', desc: 'Menschen folgen deiner klaren Vision.', icon: '🌟', reqs: { emotions: 80, social: 80, meaning: 80 } },
            { id: 'syn7', cat: 'Synergien', name: 'Biologische Homöostase', desc: 'Das perfekte biologische Gleichgewicht!', icon: '💠', reqs: { body: 85, emotions: 85, cognition: 85, competence: 85, meaning: 85, social: 85 } }
        ];

        let previouslyUnlockedSkills = new Set(); 

        // Prüft, welche Skills freigeschaltet sind
        function checkSkillUnlocks(silentInit = false) {
            let newlyUnlocked = [];
            skillDatabase.forEach(skill => {
                let unlocked = true;
                for (let dim in skill.reqs) {
                    if (appState[dim] < skill.reqs[dim]) {
                        unlocked = false;
                        break;
                    }
                }
                
                if (unlocked) {
                    if (!previouslyUnlockedSkills.has(skill.id)) {
                        previouslyUnlockedSkills.add(skill.id);
                        if (!silentInit) newlyUnlocked.push(skill);
                    }
                } else {
                    previouslyUnlockedSkills.delete(skill.id);
                }
            });

            if (newlyUnlocked.length > 0 && !silentInit) {
                const latest = newlyUnlocked[newlyUnlocked.length - 1]; 
                showToast(`Freigeschaltet: ${latest.name}`, latest.icon);
            }
            renderSkilltree();
        }

        // Generiert die visuelle Liste
        function renderSkilltree() {
            const container = document.getElementById('skilltreeContent');
            if (!container) return;
            container.innerHTML = '';

            const categories = [...new Set(skillDatabase.map(s => s.cat))];

            categories.forEach(cat => {
                const catSkills = skillDatabase.filter(s => s.cat === cat);
                
                const catDiv = document.createElement('div');
                catDiv.className = 'skill-category';
                catDiv.innerHTML = `<h3>${cat}</h3><div class="skill-grid"></div>`;
                const grid = catDiv.querySelector('.skill-grid');

                catSkills.forEach(skill => {
                    const isUnlocked = previouslyUnlockedSkills.has(skill.id);
                    const color = isUnlocked ? 'var(--accent)' : '#555';
                    
                    const card = document.createElement('div');
                    card.className = `skill-card ${isUnlocked ? 'unlocked' : ''}`;
                    
                    let reqText = '';
                    if (!isUnlocked) {
                        const reqsArr = Object.entries(skill.reqs).map(([k, v]) => `${dimensions.find(d=>d.id===k).label} ${v}`);
                        reqText = `<p style="color: #ef4444; font-size: 0.7rem; margin-top: 5px;">Benötigt: ${reqsArr.join(', ')}</p>`;
                    }

                    card.innerHTML = `
                        <div class="skill-icon" style="${isUnlocked ? 'background: rgba(56, 189, 248, 0.2); color: var(--accent);' : ''}">${skill.icon}</div>
                        <div class="skill-info">
                            <h4 style="color: ${color}">${skill.name}</h4>
                            <p>${skill.desc}</p>
                            ${reqText}
                        </div>
                    `;
                    grid.appendChild(card);
                });

                container.appendChild(catDiv);
            });
        }

        function openSkilltree() {
            document.getElementById('viewSkilltree').style.transform = 'translateX(0)';
            checkSkillUnlocks(true); 
        }

        function closeSkilltree() {
            document.getElementById('viewSkilltree').style.transform = 'translateX(100%)';
        }

        let toastTimeout;
        function showToast(text, icon) {
            const toast = document.getElementById('toast');
            document.getElementById('toastIcon').innerText = icon;
            document.getElementById('toastText').innerText = text;
            
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // --- DER KLUGE ALGORITHMUS (Multidimensionale Analyse) ---

        function updateImpuls(dimId, value) {
            const impulsEl = document.getElementById('sheetImpuls');
            if (!impulsEl || !dimId) return;
            const tempState = { ...appState };
            tempState[dimId] = parseInt(value, 10);
            impulsEl.innerText = SmartImpulsEngine.analyze(dimId, parseInt(value, 10), tempState);
        }

        let currentActiveDim = null;

        // --- ROBUSTE SPEICHERLOGIK (IndexedDB + LocalStorage Fallback) ---
        let db;
        
        function _openIDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('HumaneedDB', 1);
                request.onupgradeneeded = e => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('state')) {
                        db.createObjectStore('state');
                    }
                };
                request.onsuccess = e => {
                    db = e.target.result;
                    resolve();
                };
                request.onerror = e => reject(e);
            });
        }

        function _restoreFromIDB() {
            return new Promise((resolve) => {
                if(!db) return resolve();
                const tx = db.transaction('state', 'readonly');
                const store = tx.objectStore('state');
                const req = store.get('appState');
                req.onsuccess = () => {
                    if (req.result) {
                        appState = req.result;
                        console.log('[HUMANEED] Daten aus IndexedDB geladen.');
                        renderGrid();
                        checkSkillUnlocks(true);
                    }
                    resolve();
                };
                req.onerror = () => resolve();
            });
        }

        function _saveToIDB() {
            if(!db) return;
            const tx = db.transaction('state', 'readwrite');
            const store = tx.objectStore('state');
            store.put(appState, 'appState');
        }

        function loadState() {
            // Schneller Fallback: LocalStorage zuerst
            try {
                const saved = localStorage.getItem('humaneed_state');
                if (saved) {
                    appState = JSON.parse(saved);
                    renderGrid();
                    checkSkillUnlocks(true);
                }
            } catch (e) { console.warn("LocalStorage Fehler:", e); }

            // IndexedDB init & überschreiben falls vorhanden
            _openIDB().then(_restoreFromIDB).then(() => {
                console.log('[HUMANEED] Storage ready (IDB + localStorage)');
            }).catch(e => console.warn("IDB nicht verfügbar", e));
        }

        function saveState() {
            try {
                localStorage.setItem('humaneed_state', JSON.stringify(appState));
                _saveToIDB();
                renderGrid();
            } catch (e) {
                console.error('Fehler beim Speichern', e);
            }
        }

        // --- Initialisierung & UI Aufbau ---
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            renderGrid();
            initSheetSwipe();
            
            // Slider Event Listener für Live-Update der Zahl
            const slider = document.getElementById('levelSlider');
            const valDisplay = document.getElementById('sheetValue');
            slider.addEventListener('input', (e) => {
                const currentVal = e.target.value;
                valDisplay.innerText = currentVal;
                valDisplay.style.color = getGradientColor(currentVal);
                if (currentActiveDim) {
                    updateImpuls(currentActiveDim.id, currentVal);
                }
            });
        });

        function renderGrid() {
            const grid = document.getElementById('dimensionGrid');
            if(!grid) return;
            grid.innerHTML = '';

            dimensions.forEach(dim => {
                const value = appState[dim.id];
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openSheet(dim);
                
                card.innerHTML = `
                    <div class="card-icon">${dim.icon}</div>
                    <div class="card-title">${dim.label}</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="bar-${dim.id}" 
                             style="width: ${value}%; background-color: ${getGradientColor(value)};">
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Sheet Navigation & Logik ---
        function openSheet(dim) {
            currentActiveDim = dim;
            document.getElementById('sheetIcon').innerText = dim.icon;
            document.getElementById('sheetTitle').innerText = dim.label;
            document.getElementById('sheetTitle').style.color = dim.color;
            document.getElementById('sheetDesc').innerText = dim.desc;
            
            const val = appState[dim.id];
            const slider = document.getElementById('levelSlider');
            slider.value = val;
            
            const valDisplay = document.getElementById('sheetValue');
            valDisplay.innerText = val;
            valDisplay.style.color = getGradientColor(val);

            updateImpuls(dim.id, val);

            document.getElementById('sheetBackdrop').classList.add('active');
            document.getElementById('viewSheet').classList.add('active');
        }

        function goHome() {
            document.getElementById('sheetBackdrop').classList.remove('active');
            const sheet = document.getElementById('viewSheet');
            // WICHTIG: Reset auf zentrierte X-Achse und 100% Y-Achse
            sheet.style.transform = 'translateX(-50%) translateY(100%)'; 
            sheet.classList.remove('active');
            setTimeout(() => { sheet.style.transform = ''; }, 300); // Aufräumen nach Transition
            currentActiveDim = null;
        }

        function saveCurrentDimension() {
            if (currentActiveDim) {
                const val = parseInt(document.getElementById('levelSlider').value, 10);
                appState[currentActiveDim.id] = val;
                saveState();
                checkSkillUnlocks();
                goHome();
            }
        }

        function getGradientColor(value) {
            if (value < 33) return '#ef4444'; // Rot
            if (value < 66) return '#f59e0b'; // Gelb
            return '#10b981'; // Grün
        }

        // ── Swipe-to-dismiss for bottom sheets (Original zentrierte Logik) ──
        function initSheetSwipe() {
            document.querySelectorAll('.view:not(#viewHome):not(#viewSkilltree)').forEach(sheet => {
                let startY = 0, curY = 0, dragging = false;

                sheet.addEventListener('touchstart', e => {
                    if (sheet.scrollTop > 4) return;
                    startY = e.touches[0].clientY;
                    dragging = true;
                    sheet.style.transition = 'none';
                }, { passive: true });

                sheet.addEventListener('touchmove', e => {
                    if (!dragging) return;
                    curY = e.touches[0].clientY;
                    const dy = Math.max(0, curY - startY);
                    
                    // Exakter Original-Code für zentriertes Layout!
                    sheet.style.transform = `translateX(-50%) translateY(${dy}px)`;
                    
                    const bd = document.getElementById('sheetBackdrop');
                    if (bd) bd.style.opacity = Math.max(0, 1 - dy / 280);
                }, { passive: true });

                sheet.addEventListener('touchend', () => {
                    if (!dragging) return;
                    dragging = false;
                    sheet.style.transition = ''; 
                    
                    const dy = curY - startY;
                    if (dy > 110) {
                        goHome();
                    } else {
                        // Zurückschnappen auf aktiven zentrierten Zustand
                        sheet.style.transform = 'translateX(-50%) translateY(0)';
                        const bd = document.getElementById('sheetBackdrop');
                        if (bd) bd.style.opacity = '1';
                    }
                });
            });
        }
    </script>
