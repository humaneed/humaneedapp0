<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humaneed v6 – Philosophical Life Navigation</title>

<style>
body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    margin: 0;
}

.app {
    width: 390px;
    padding: 24px;
    padding-bottom: 50px;
}

h1 {
    font-size: 18px;
    letter-spacing: 2px;
    opacity: .8;
    margin-bottom: 10px;
}

.card {
    background: #1b1f27;
    padding: 20px;
    border-radius: 14px;
    margin-top: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,.4);
    transition: all 0.3s ease;
}

.flow-state {
    box-shadow: 0 0 20px rgba(0, 194, 168, 0.4);
    border: 1px solid rgba(0, 194, 168, 0.3);
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00c2a8;
    color: #0f1115;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: opacity 0.2s;
}

button:hover {
    opacity: 0.9;
}

button.alt {
    background: #2c3442;
    color: white;
}

button.danger {
    background: #4a2c2c;
    color: #ff8888;
    margin-top: 24px;
}

.dimension {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 14px;
}

.bar {
    height: 6px;
    background: #333;
    border-radius: 6px;
    margin-top: 4px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: #00c2a8;
    border-radius: 6px;
    transition: width 0.4s ease;
}

.trait {
    background: #2c3442;
    padding: 8px;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 13px;
    display: inline-block;
    margin-right: 6px;
}

textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #2c3442;
    color: white;
    resize: vertical;
    box-sizing: border-box;
    font-family: inherit;
}

.small {
    opacity: .7;
    font-size: 13px;
    margin-top: 4px;
}

.status-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    opacity: 0.8;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #333;
}
</style>
</head>

<body>

<div class="app">

    <h1>TODAY'S MEANINGFUL STEP</h1>

    <div class="card">
        <div id="actionTitle" style="font-weight: bold; font-size: 16px;"></div>
        <div id="actionDesc" class="small"></div>
        
        <div class="status-row">
            <span id="sysEnergy">Energy: 60</span>
            <span id="sysTime">Time: 30m</span>
        </div>

        <button onclick="completeAction()">Mark as complete</button>
        <button class="alt" onclick="generateAction()">Alternative action</button>
    </div>

    <div class="card" id="harmonyCard">
        <h3>System Harmony (Logos)</h3>
        <div id="harmony" style="font-weight: bold; color: #00c2a8;"></div>
        <div id="harmonyDesc" class="small"></div>
    </div>

    <div class="card">
        <h3>Life Dimensions</h3>
        <div id="dimensions"></div>
    </div>

    <div class="card">
        <h3>Identity Traits</h3>
        <div id="traits">No traits unlocked yet.</div>
    </div>

    <div class="card">
        <h3>Reflection (Observer Effect)</h3>
        <div class="small">Give meaning to the structure. Reflections > 20 characters shape your reality.</div>
        <textarea id="reflection" placeholder="What mattered today? How did it feel? (Qualia)"></textarea>
        <button onclick="saveReflection()">Save Reflection & Shape Reality</button>
    </div>

    <button class="danger" onclick="applyEntropy()">Simulate Time Passing (Entropy)</button>

</div>

<script>
// --- KONSTANTEN (Best Practice) ---
const POINTS_PER_ACTION = 5;
const FLOW_TOLERANCE = 15; // Max. Abweichung für den perfekten Flow
const ENTROPY_DECAY = 2; // Punkteverlust durch Zeit

// --- STATE & CONTEXT ---
let state = {
    body: 60,
    mind: 50,
    emotion: 55,
    social: 40,
    skill: 50,
    meaning: 65
};

let context = {
    energy: 60,
    timeAvailable: 30
};

let traits = [];

const actions = {
    mind: [
        {title: "Deep Work Session", desc: "30 minutes single-task focus", duration: 30, energy: 50},
        {title: "Focused Reading", desc: "20 minutes learning", duration: 20, energy: 30}
    ],
    body: [
        {title: "Movement Break", desc: "15 minute walk", duration: 15, energy: 20},
        {title: "Stretch Session", desc: "10 minutes mobility", duration: 10, energy: 15}
    ],
    social: [
        {title: "Reach Out", desc: "Send a message to a friend", duration: 5, energy: 10},
        {title: "Short Call", desc: "10 minute connection", duration: 10, energy: 20}
    ],
    emotion: [
        {title: "Mindful Breathing", desc: "5 minute reset", duration: 5, energy: 10},
        {title: "Gratitude Note", desc: "Write one gratitude", duration: 10, energy: 15}
    ],
    skill: [
        {title: "Skill Practice", desc: "20 minutes improvement", duration: 20, energy: 30},
        {title: "Micro Learning", desc: "Watch a tutorial", duration: 15, energy: 20}
    ],
    meaning: [
        {title: "Purpose Reflection", desc: "Write about your goals", duration: 15, energy: 15},
        {title: "Journal", desc: "Reflect on today's direction", duration: 10, energy: 10}
    ]
};

let currentDimension = null;

// --- PHILOSOPHISCHE MECHANIKEN ---

// 1. Kausale Brücke (Funktionalismus)
// Körper und Geist bedingen sich gegenseitig.
function applyCausalEffects(completedDimension) {
    if (completedDimension === 'body') {
        context.energy = Math.min(100, context.energy + 15);
    } else if (completedDimension === 'emotion') {
        context.timeAvailable += 10; // Fühlt sich an wie mehr Zeit durch innere Ruhe
    } else if (completedDimension === 'mind') {
        context.energy = Math.max(0, context.energy - 10); // Geistige Arbeit kostet Systemenergie
    }
    updateContextUI();
}

// 2. Entropie (Der universelle Verfall)
function applyEntropy() {
    for (let key in state) {
        state[key] = Math.max(0, state[key] - ENTROPY_DECAY);
    }
    
    // Energie regeneriert sich durch Zeit minimal, Zeitfenster resettet sich
    context.energy = Math.min(100, context.energy + 20);
    context.timeAvailable = 30;
    
    updateDimensions();
    updateHarmony();
    updateContextUI();
    generateAction();
    
    alert("Entropie: Die Zeit ist vergangen. Die Struktur erfordert neue Energie, um nicht zu zerfallen.");
}

// 3. Das Teilnehmer-Universum (Beobachter-Paradoxon / Qualia)
function saveReflection() {
    let text = document.getElementById("reflection").value;
    
    if (text.length > 20) {
        // Echtes Bewusstsein formt die Materie (Werte steigen)
        state.meaning = Math.min(100, state.meaning + 5);
        state.mind = Math.min(100, state.mind + 3);
        alert("Qualia erfasst: Dein Bewusstsein hat der Struktur Sinn verliehen (+Meaning, +Mind).");
    } else if (text.length > 0) {
        alert("Flüchtiger Gedanke gespeichert. Keine systemische Resonanz.");
    } else {
        alert("Das System bleibt ohne bewusstes Erleben unverändert.");
    }

    localStorage.setItem("humaneed_reflection", text);
    document.getElementById("reflection").value = ""; // Clear after save
    
    updateDimensions();
    updateHarmony();
}

// --- KERN-LOGIK ---

function lowestDimension() {
    let lowest = Object.keys(state)[0];
    for(let key in state) {
        if(state[key] < state[lowest]) {
            lowest = key;
        }
    }
    return lowest;
}

function generateAction() {
    currentDimension = lowestDimension();
    let options = actions[currentDimension];
    
    let filtered = options.filter(a => 
        a.duration <= context.timeAvailable && 
        a.energy <= context.energy
    );

    if (filtered.length === 0) {
        filtered = options; // Fallback, falls keine Aktion passt
    }

    let action = filtered[Math.floor(Math.random() * filtered.length)];

    document.getElementById("actionTitle").innerText = `[${currentDimension.toUpperCase()}] ${action.title}`;
    document.getElementById("actionDesc").innerText = `${action.desc} (-${action.energy} Energy, -${action.duration}m Time)`;
}

function completeAction() {
    // 1. Aktion ausführen
    state[currentDimension] += POINTS_PER_ACTION;
    if (state[currentDimension] > 100) state[currentDimension] = 100;

    // 2. Kontext anpassen (Kosten der Aktion)
    let act = actions[currentDimension].find(a => document.getElementById("actionTitle").innerText.includes(a.title));
    if (act) {
        context.energy = Math.max(0, context.energy - act.energy);
        context.timeAvailable = Math.max(0, context.timeAvailable - act.duration);
    }

    // 3. Philosophische Kausalität anwenden
    applyCausalEffects(currentDimension);

    // 4. UI updaten
    unlockTrait();
    updateHarmony();
    updateDimensions();
    generateAction();
}

function updateHarmony() {
    let values = Object.values(state);
    let sum = values.reduce((acc, val) => acc + val, 0);
    let avg = Math.round(sum / values.length);
    
    let max = Math.max(...values);
    let min = Math.min(...values);
    let isFlowState = (max - min) <= FLOW_TOLERANCE;

    let harmonyText = avg + "% System Balance";
    let descText = `Variance: ${max - min} (Aim for < ${FLOW_TOLERANCE})`;
    
    let card = document.getElementById("harmonyCard");

    // Der Logos manifestiert sich
    if (isFlowState) {
        harmonyText += " ✦ LOGOS ACHIEVED";
        descText = "Perfect architectural resonance. Energy drain is mitigated.";
        card.classList.add("flow-state");
        context.energy = 100; // Bonus für Flow State
        updateContextUI();
    } else {
        card.classList.remove("flow-state");
    }

    document.getElementById("harmony").innerText = harmonyText;
    document.getElementById("harmonyDesc").innerText = descText;
}

function updateDimensions() {
    let html = "";
    for (let key in state) {
        html += `
        <div class="dimension">
            <div style="text-transform: capitalize;">${key}</div>
            <div>${state[key]}</div>
        </div>
        <div class="bar">
            <div class="fill" style="width:${state[key]}%"></div>
        </div>
        `;
    }
    document.getElementById("dimensions").innerHTML = html;
}

function unlockTrait() {
    let added = false;
    if (state.mind > 70 && !traits.includes("Focus Builder")) { traits.push("Focus Builder"); added = true; }
    if (state.social > 70 && !traits.includes("Connector")) { traits.push("Connector"); added = true; }
    if (state.meaning > 70 && !traits.includes("Seeker")) { traits.push("Seeker"); added = true; }
    
    // Neues Traits für Systemdenker (Logos)
    let values = Object.values(state);
    if (Math.min(...values) > 60 && !traits.includes("Architect")) { traits.push("Architect"); added = true; }

    if (added) renderTraits();
}

function renderTraits() {
    if (traits.length === 0) return;
    let html = "";
    traits.forEach(t => {
        html += `<div class="trait">${t}</div>`;
    });
    document.getElementById("traits").innerHTML = html;
}

function updateContextUI() {
    document.getElementById("sysEnergy").innerText = `System Energy: ${context.energy}`;
    document.getElementById("sysTime").innerText = `Time Available: ${context.timeAvailable}m`;
}

// --- INITIALISIERUNG ---
generateAction();
updateDimensions();
updateHarmony();
updateContextUI();
renderTraits();

</script>
</body>
</html>
